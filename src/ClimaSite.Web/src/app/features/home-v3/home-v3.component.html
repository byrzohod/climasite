<div class="home-v3" data-testid="home-v3">
  <section class="hero" data-testid="home-v3-hero">
    <div class="hero-grid">
      <app-home-v3-wizard></app-home-v3-wizard>
      @defer (on timer(2200ms)) {
        <app-room-preview
          [area]="area()"
          [roomType]="roomType()"
          [zone]="zone()"
          [outsideC]="outsideC()"
          [insideC]="insideC()"
          [watts]="watts()"
          [theme]="theme()"
        ></app-room-preview>
      } @placeholder {
        <div class="preview-placeholder" aria-hidden="true"></div>
      }
    </div>
  </section>

  @defer (on timer(2200ms)) {
    <app-home-v3-recommendations
      [products]="recommendations()"
      [loading]="loading()"
      [error]="error()"
    ></app-home-v3-recommendations>
  } @placeholder {
    <section class="recommendations-placeholder" data-testid="home-v3-recommendations-placeholder" aria-live="polite"></section>
  }

  @defer (on timer(2200ms)) {
    <app-home-v3-secondary-content />
  } @placeholder {
    <div class="secondary-placeholder" aria-hidden="true"></div>
  }
</div>
