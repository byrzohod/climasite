name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Core Unit Tests
        run: dotnet test tests/ClimaSite.Core.Tests --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Run Application Unit Tests
        run: dotnet test tests/ClimaSite.Application.Tests --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unit-tests
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: climasite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d climasite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Integration Tests
        run: dotnet test tests/ClimaSite.Api.Tests --no-build --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=climasite_test;Username=test;Password=test;SSL Mode=Disable"

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/ClimaSite.Web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/ClimaSite.Web

      - name: Run tests
        run: npm test -- --browsers=ChromeHeadless --watch=false
        working-directory: src/ClimaSite.Web

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/ClimaSite.Web/package-lock.json

      - name: Build Backend
        run: dotnet build --configuration Release

      - name: Build Frontend
        run: |
          cd src/ClimaSite.Web
          npm ci
          npm run build

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, frontend-tests]
    # Setup (container start + backend build + e2e frontend build + ng serve warmup) can take
    # ~20min on a cold/slow runner; 30min left too little for the suite and the job was canceled
    # mid-run, surfacing as intermittent "flaky" E2E failures. 50min gives headroom.
    timeout-minutes: 50

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: climasite_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d climasite_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/ClimaSite.Web/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build Backend
        run: dotnet build --configuration Release --no-restore

      - name: Install Frontend dependencies
        run: npm ci
        working-directory: src/ClimaSite.Web

      - name: Build Frontend
        run: npm run build -- --configuration=e2e
        working-directory: src/ClimaSite.Web

      - name: Install Playwright Browsers
        run: |
          dotnet build tests/ClimaSite.E2E --configuration Release --no-restore
          pwsh tests/ClimaSite.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      - name: Start API Server
        run: |
          dotnet run --project src/ClimaSite.Api --configuration Release --no-build --no-launch-profile &
          echo "Waiting for API to start..."
          timeout 60 bash -c 'until curl -s http://localhost:5029/health > /dev/null 2>&1; do sleep 2; done'
          echo "API is ready!"
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: http://localhost:5029
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=climasite_e2e;Username=test;Password=test;SSL Mode=Disable"
          ConnectionStrings__Redis: "localhost:6379"
          JWT_SECRET: "e2e-test-secret-key-that-is-at-least-32-characters-long"
          JWT_ISSUER: "http://localhost:5029"
          JWT_AUDIENCE: "http://localhost:4200"
          TestSettings__AdminSecret: "test-admin-secret"

      - name: Start Angular Dev Server
        run: |
          npm run start -- --configuration=e2e --port=4200 &
          echo "Waiting for Angular to start..."
          timeout 120 bash -c 'until curl -s http://localhost:4200 > /dev/null 2>&1; do sleep 2; done'
          echo "Angular is ready!"
        working-directory: src/ClimaSite.Web
        env:
          CI: true

      - name: Run E2E Tests
        run: dotnet test tests/ClimaSite.E2E --configuration Release --logger "trx;LogFileName=e2e-results.trx" --logger "console;verbosity=detailed"
        env:
          E2E_BASE_URL: http://localhost:4200
          E2E_API_URL: http://localhost:5029
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true
          TEST_ADMIN_SECRET: "test-admin-secret"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            tests/ClimaSite.E2E/test-results/
            tests/ClimaSite.E2E/playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tests/ClimaSite.E2E/TestResults/
          retention-days: 7

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Verify C# formatting (dotnet format)
        run: dotnet format ClimaSite.NoE2E.slnf --verify-no-changes --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/ClimaSite.Web/package-lock.json

      - name: Install Frontend dependencies
        run: npm ci
        working-directory: src/ClimaSite.Web

      - name: ESLint (ng lint)
        run: npm run lint
        working-directory: src/ClimaSite.Web

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: .NET vulnerable packages (fail on any)
        run: |
          out="$(dotnet list ClimaSite.NoE2E.slnf package --vulnerable --include-transitive 2>&1)"
          echo "$out"
          if echo "$out" | grep -qiE 'has the following vulnerable|>\s*(Critical|High|Moderate|Low)\b'; then
            echo "::error::Vulnerable .NET packages found — update them before merge."
            exit 1
          fi
          echo "No vulnerable .NET packages."

      - name: Secret scan (gitleaks — informational until allowlisted, SEC-13)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filesystem vulnerability scan (Trivy, CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln          # vuln-only; secrets are gitleaks' job (Trivy's secret scanner false-flagged the dummy appsettings Stripe key, SEC-07)
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: npm audit (informational — high-sev Angular advisory tracked in SEC-12)
        run: npm audit --omit=dev || true
        working-directory: src/ClimaSite.Web

  adr-gate:
    name: ADR Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate ADR filenames + immutability
        run: bash scripts/ci/adr-gate.sh

  test-design-lint:
    name: Test-Design Coverage Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Every automated scenario names an existing test
        run: bash scripts/ci/test-design-coverage.sh

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    # ENFORCING (PROC-01 Wave 3c, owner-approved 2026-06-22): fails if backend line coverage < 80%
    # or frontend line coverage < 70% (generated code excluded via coverlet.runsettings). Required via
    # the Test Summary check. Gated on LINE coverage only (branch/function coverage is lower by design).
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore + build
        run: |
          dotnet restore
          dotnet build ClimaSite.NoE2E.slnf --no-restore

      - name: Backend coverage (NoE2E incl. integration via Testcontainers)
        run: dotnet test ClimaSite.NoE2E.slnf --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./coverage

      - name: Aggregate backend coverage
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:'./coverage/**/coverage.cobertura.xml' -targetdir:./coverage-report -reporttypes:'TextSummary;MarkdownSummaryGithub' || true
          echo "### Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,20p' ./coverage-report/Summary.txt | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Enforce backend line coverage >= 80%
        run: |
          BE=$(grep -oE 'Line coverage: [0-9.]+%' ./coverage-report/Summary.txt | grep -oE '[0-9.]+' | head -1)
          echo "Backend line coverage: ${BE:-unknown}%  (threshold 80%)"
          if [ -z "$BE" ]; then echo "::error::could not parse backend coverage from Summary.txt"; exit 1; fi
          awk -v c="$BE" 'BEGIN{ if (c+0 < 80) exit 1 }' || { echo "::error::Backend line coverage ${BE}% is below the 80% gate"; exit 1; }
          echo "Backend coverage OK (${BE}% >= 80%)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/ClimaSite.Web/package-lock.json

      - name: Frontend coverage
        run: |
          npm ci
          set -o pipefail
          npm test -- --browsers=ChromeHeadless --watch=false --code-coverage 2>&1 | tee /tmp/fe-cov.log
        working-directory: src/ClimaSite.Web

      - name: Enforce frontend line coverage >= 70%
        run: |
          FE=$(grep -oE 'Lines[[:space:]]*:[[:space:]]*[0-9.]+%' /tmp/fe-cov.log | grep -oE '[0-9.]+' | tail -1)
          echo "Frontend line coverage: ${FE:-unknown}%  (threshold 70%)"
          if [ -z "$FE" ]; then echo "::error::could not parse frontend coverage from test output"; exit 1; fi
          awk -v c="$FE" 'BEGIN{ if (c+0 < 70) exit 1 }' || { echo "::error::Frontend line coverage ${FE}% is below the 70% gate"; exit 1; }
          echo "Frontend coverage OK (${FE}% >= 70%)"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            ./coverage-report/
            src/ClimaSite.Web/coverage/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, frontend-tests, build, e2e-tests, lint-format, dependency-audit, adr-gate, test-design-lint, coverage]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.lint-format.result }}" != "success" ] || \
             [ "${{ needs.dependency-audit.result }}" != "success" ] || \
             [ "${{ needs.adr-gate.result }}" != "success" ] || \
             [ "${{ needs.test-design-lint.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed!"
